<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Canvas for Fireworks & Particles -->
    <canvas id="bg-canvas"></canvas>
    <div class="glow-orb"></div>

    <!-- Music Control -->
    <button id="music-toggle" title="Toggle Music">
        <span id="music-icon">🔇</span>
    </button>
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- 1. Intro Screen -->
    <section id="intro-screen" class="screen">
        <div class="intro-text">
            <h1>Tonight is not just a night ✨</h1>
            <p>Something magical is waiting...</p>
            <button id="start-btn" class="btn-romantic">Tap to Begin 💖</button>
        </div>
    </section>

    <!-- 2. Story Screen -->
    <section id="story-screen" class="screen hidden">
        <div class="slider-container">
            <div class="slide active" data-title="How It Started 💫">
                <img src="photo1.jpg" alt="Slide 1">
                <div class="slide-content">
                    <h2 class="slide-title">How It Started 💫</h2>
                </div>
            </div>
            <div class="slide" data-title="Beautiful Moments 🌸">
                <img src="photo2.jpg" alt="Slide 2">
                <div class="slide-content">
                    <h2 class="slide-title">Beautiful Moments 🌸</h2>
                </div>
            </div>
            <div class="slide" data-title="You Are My Happiness ❤️">
                <img src="photo3.jpg" alt="Slide 3">
                <div class="slide-content">
                    <h2 class="slide-title">You Are My Happiness ❤️</h2>
                </div>
            </div>
            <div class="slide" data-title="Happy Birthday ❤️">
                <img src="photo4.jpg" alt="Slide 4">
                <div class="slide-content">
                    <h2 class="slide-title">Happy Birthday ❤️</h2>
                    
                    <!-- Final Interactive Slide Elements (hidden until last slide) -->
                    <div id="final-controls" class="hidden">
                        <p style="margin-top: 20px; font-size: 1.2rem;">Tonight is all about you ❤️</p>
                        <div class="interaction-panel">
                            <button id="decorate-btn" class="btn-action">✨ Decorate</button>
                            <button id="balloons-btn" class="btn-action">🎈 Add Balloons</button>
                            <button id="cake-btn" class="btn-action">🎂 Show Cake</button>
                        </div>

                        <div id="cake-container">
                            <div class="cake">
                                <div class="frosting"></div>
                                <div class="frosting-drip" style="left: 10px; height: 25px;"></div>
                                <div class="frosting-drip" style="left: 40px; height: 35px;"></div>
                                <div class="frosting-drip" style="left: 75px; height: 20px;"></div>
                                <div class="frosting-drip" style="left: 110px; height: 30px;"></div>
                                <div class="frosting-drip" style="left: 145px; height: 25px;"></div>
                                <div class="cake-layer"></div>
                            </div>
                            <div class="candles-container">
                                <div class="candle candle-1" id="candle-1"><div class="flame"></div></div>
                                <div class="candle candle-2" id="candle-2"><div class="flame"></div></div>
                                <div class="candle candle-3" id="candle-3"><div class="flame"></div></div>
                            </div>
                        </div>

                        <div id="final-message"></div>
                    </div>
                </div>
            </div>

            <button class="nav-btn prev-btn">❮</button>
            <button class="nav-btn next-btn">❯</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
