<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div id="bg-glow"></div>
    <canvas id="fireworks-canvas"></canvas>
    <div id="hearts-container"></div>

    <!-- Intro Screen -->
    <section id="intro-screen" class="active">
        <div class="content">
            <h1 class="fade-in">Tonight is not just a night ✨</h1>
            <p class="fade-in delay-1">Something magical is waiting...</p>
            <button id="start-btn" class="fade-in delay-2">Tap to Begin 💖</button>
        </div>
    </section>

    <!-- Story Slider -->
    <section id="story-slider">
        <div class="slider-container">
            <div class="slide active" data-index="0">
                <img src="photo1.jpg" alt="How It Started" onerror="this.src='https://picsum.photos/seed/love1/800/1000'">
                <div class="slide-text">How It Started 💫</div>
            </div>
            <div class="slide" data-index="1">
                <img src="photo2.jpg" alt="Beautiful Moments" onerror="this.src='https://picsum.photos/seed/love2/800/1000'">
                <div class="slide-text">Beautiful Moments 🌸</div>
            </div>
            <div class="slide" data-index="2">
                <img src="photo3.jpg" alt="You Are My Happiness" onerror="this.src='https://picsum.photos/seed/love3/800/1000'">
                <div class="slide-text">You Are My Happiness ❤️</div>
            </div>
            <div class="slide" data-index="3">
                <img src="photo4.jpg" alt="Happy Birthday" onerror="this.src='https://picsum.photos/seed/love4/800/1000'">
                <div class="slide-text">Happy Birthday ❤️</div>
            </div>
            <div class="slide black-screen" data-index="4">
                <!-- Pure Black Transition -->
            </div>
        </div>

        <div class="slider-controls">
            <button id="prev-btn">←</button>
            <button id="next-btn">→</button>
        </div>
    </section>

    <!-- Final Interactive Slide -->
    <section id="final-slide">
        <div class="content">
            <h2 id="final-title">Tonight is all about you ❤️</h2>
            
            <div id="interaction-buttons">
                <button id="decorate-btn">✨ Decorate</button>
                <button id="balloons-btn">🎈 Add Balloons</button>
                <button id="cake-btn">🎂 Show Cake</button>
                <button id="sprinkles-btn" class="hidden">🍭 Add Sprinkles</button>
                <button id="frosting-btn" class="hidden">🍦 Add Frosting</button>
            </div>

            <p id="cake-instruction" class="hidden fade-in">Make a wish and click on the candles ✨</p>

            <div id="cake-container" class="hidden">
                <div class="cake">
                    <div class="plate"></div>
                    <div class="layer layer-bottom"></div>
                    <div class="layer layer-middle"></div>
                    <div class="layer layer-top"></div>
                    <div class="icing"></div>
                    <div class="drips"></div>
                    <div class="candles">
                        <div class="candle" id="candle-1"><div class="flame"></div></div>
                        <div class="candle" id="candle-2"><div class="flame"></div></div>
                        <div class="candle" id="candle-3"><div class="flame"></div></div>
                    </div>
                </div>
            </div>

            <div id="final-message" class="hidden"></div>
        </div>
    </section>

    <!-- Music Control -->
    <button id="music-toggle" class="hidden">🎵</button>
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
